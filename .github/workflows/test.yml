name: Tests

on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements*.txt"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements*.txt"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements-dev.txt

      - run: pytest -v
